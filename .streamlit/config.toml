[theme]
# The main accent color for buttons and sliders (Forest Green)
primaryColor="#2E7D32" 

# The main background color of your app (Light Mint)
backgroundColor="#F1F8E9" 

# The color for sidebars and cards
secondaryBackgroundColor="#C8E6C9"

# The color of your text (Deep Forest Green)
textColor="#1B5E20"

font="sans serif"

[client]
# This hides the 'Deploy' and 'Menu' buttons for a cleaner look
toolbarMode="minimal"
[theme]
primaryColor = "#2E7D32" # Forest Green
backgroundColor = "#0E1117" # Charcoal Black
secondaryBackgroundColor = "#1A1C23" # Gunmetal Gray
textColor = "#E0E0E0" # Off-white
font = "sans serif"